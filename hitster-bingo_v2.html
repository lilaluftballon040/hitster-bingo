function checkBingo(marked){
  const m=i=>marked[i];
  for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>m(r*5+c))) return true;
  for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>m(r*5+c))) return true;
  if([0,6,12,18,24].every(m)) return true;
  if([4,8,12,16,20].every(m)) return true;
  return false;
}

function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s]/g,'').trim(); }

function checkAnswer(catId, userAns, round){
  const ua = norm(userAns);
  if(!ua) return false;
  const fuzzy = (a,b) => a.includes(b) || b.includes(a);
  switch(catId){
    case 'title':      return fuzzy(norm(round.title||''), ua);
    case 'artist':     return fuzzy(norm(round.artist||''), ua);
    case 'decade':     { const d=String(round.decade); return ua.includes(d.slice(0,3)); }
    case 'year':       return parseInt(ua)===round.year;
    case 'album':      return fuzzy(norm(round.album||''), ua);
    case 'featuring':  return fuzzy(norm(round.featuring||''), ua);
    case 'label':      return fuzzy(norm(round.label||''), ua);
    case 'genre':      return fuzzy(norm(round.genre||''), ua);
    case 'popularity': return Math.abs(parseInt(ua)-(round.popularity||0))<=10;
    default: return false;
  }
}

  if(st){ S.spotifyToken=st; return true; }

}

function extractPID(url){ return url.match(/playlist\/([A-Za-z0-9]+)/)?.[1]||url.trim(); }

async function loadTracks(url){
  const pid=extractPID(url);
  const tracks=[];
  let next=`https://api.spotify.com/v1/playlists/${pid}/tracks?limit=100&fields=next,items(track(id,name,artists,album(id,name,release_date),popularity))`;
  while(next && tracks.length<300){
    const r=await fetch(next,{headers:{Authorization:`Bearer ${S.spotifyToken}`}});
    if(!r.ok) throw new Error('Playlist nicht gefunden.');
    const d=await r.json();
    d.items?.forEach(i=>{ if(i.track?.id) tracks.push(i.track); });
    next=d.next;
  }
  return tracks;
}

async function buildRound(track, diff){
  const year=parseInt(track.album?.release_date?.slice(0,4))||2000;
  const rd={
    trackId:track.id, uri:`spotify:track:${track.id}`,
    title:track.name,
    artist:track.artists[0]?.name||'',
    featuring:track.artists.slice(1).map(a=>a.name).join(', '),
    album:track.album?.name||'',
    year, decade:Math.floor(year/10)*10,
    popularity:track.popularity||0,
    label:'', genre:'', category:''
  };
  if(diff==='hard'){
    try{
      const [al,ar]=await Promise.all([
        fetch(`https://api.spotify.com/v1/albums/${track.album.id}`,{headers:{Authorization:`Bearer ${S.spotifyToken}`}}).then(r=>r.json()),
        fetch(`https://api.spotify.com/v1/artists/${track.artists[0].id}`,{headers:{Authorization:`Bearer ${S.spotifyToken}`}}).then(r=>r.json()),
      ]);
      rd.label=al.label||''; rd.genre=ar.genres?.[0]||'';
    }catch(e){console.warn(e);}
  }
  return rd;
}

function startTimer(secs, onTick, onEnd){
  clearInterval(S.timerID);
  S.timerLeft=secs;
  onTick(secs,secs);
  S.timerID=setInterval(()=>{
    S.timerLeft--;
    onTick(S.timerLeft,secs);
    if(S.timerLeft<=0){ clearInterval(S.timerID); onEnd(); }
  },1000);
}
function stopTimer(){ clearInterval(S.timerID); S.timerID=null; }

function tickUI(left, max){
  const bar=$('tbar'), lbl=$('tlbl');
  if(bar){ bar.style.width=(left/max*100)+'%'; if(left<=10) bar.classList.add('warn'); else bar.classList.remove('warn'); }
  if(lbl) lbl.textContent=left+'s';
}

function drawWheel(canvas, cats){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, r=Math.min(cx,cy)-6;
  const n=cats.length, seg=2*Math.PI/n;
  ctx.clearRect(0,0,W,H);
  ctx.beginPath(); ctx.arc(cx,cy,r+4,0,2*Math.PI);
  ctx.fillStyle='rgba(232,160,32,.15)'; ctx.fill();
  cats.forEach((c,i)=>{
    const a0=S.wheelRot+i*seg, a1=a0+seg;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
    ctx.fillStyle=c.color+(i%2?'dd':'bb'); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a0+seg/2);
    ctx.font=`${Math.max(14,Math.floor(r*.14))}px serif`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(c.icon, r-8, -10);
    ctx.font=`bold 12px 'DM Sans',sans-serif`;
    ctx.fillStyle='#fff';
    ctx.fillText(c.label, r-8, 10);
    ctx.restore();
  });
}

function spinTo(canvas, cats, tIdx, done){
  const n=cats.length, seg=2*Math.PI/n;
  const tCenter=tIdx*seg+seg/2;
  const tRot=-Math.PI/2-tCenter;
  const spins=6*2*Math.PI;
  const cur=((S.wheelRot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const target=((tRot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const amount=spins+((target-cur+2*Math.PI)%(2*Math.PI));
  const start=S.wheelRot, t0=performance.now(), dur=4000;
  const ease=t=>1-Math.pow(1-t,4);
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    S.wheelRot=start+amount*ease(t);
    drawWheel(canvas,cats);
    if(t<1) requestAnimationFrame(frame);
    else{ setTimeout(()=>done(cats[tIdx]),400); }
  }
  requestAnimationFrame(frame);
}

    <div class="nav"><button class="btn bg" onclick="scLanding()">←</button><span class="ntit">Setup</span><div style="width:40px"></div></div>
    <div style="margin:20px 0">
      <label class="lbl">1 · Spotify</label>
      ${ok?`<div style="color:var(--green)">✓ Verbunden</div>`:`<button class="btn bp" style="width:100%" onclick="spotifyLogin()">Anmelden</button>`}
    </div>
    <div style="margin:20px 0">
      <label class="lbl">2 · Schwierigkeit</label>
      ${['easy','medium','hard'].map(d=>`<button class="dbtn ${S.difficulty===d?'sel':''}" onclick="S.difficulty='${d}';scHostSetup()">${DIFF_META[d].name}</button>`).join('')}
    </div>
    <div style="margin:20px 0">
      <label class="lbl">3 · Playlist URL</label>
      <input class="inp" id="purl" value="${S.playlistUrl}" oninput="S.playlistUrl=this.value;$('crbtn').disabled=!canCreate()">
    </div>
    <button class="btn bp blg" id="crbtn" style="width:100%" ${canCreate()?'':'disabled'} onclick="doCreateRoom()">Raum erstellen</button>
  </div>`);
}

function canCreate(){ return !!S.spotifyToken && !!S.difficulty && !!S.playlistUrl; }

async function beginHost(){
  parseToken();
  if(S.spotifyToken){ if(!await tokenValid()){ clearToken(); } }
  loadSDK(); S.role='host'; scHostSetup();
}

async function doCreateRoom(){
  loading('Lade...');
  try {
    await initPlayer(S.spotifyToken);
    S.tracks = await loadTracks(S.playlistUrl);
    S.roomCode = genCode();
    await fbSet(`rooms/${S.roomCode}`, { phase:'lobby', difficulty:S.difficulty, players:{}, roundNum:0 });
    fbOn(fdb.ref(`rooms/${S.roomCode}/players`), 'value', snap => { S.players=snap.val()||{}; scHostLobby(); });
    S.phase='lobby';
  } catch(e) { alert(e); scHostSetup(); }
}

function scHostLobby(){
  const pls=Object.values(S.players);
  show(`<div style="padding:40px;text-align:center">
    <div class="rcode">${S.roomCode}</div>
    <div style="margin:20px 0">${pls.map(p=>`<div class="chip">${p.name}</div>`).join('')}</div>
    <button class="btn bp blg" ${pls.length<1?'disabled':''} onclick="doStartGame()">Start (${pls.length})</button>
  </div>`);
}

async function doStartGame(){
  for(const pid in S.players){ await fbUpd(`rooms/${S.roomCode}/players/${pid}`, { card:genCard(S.difficulty), marked:Array(25).fill(false), score:0 }); }
  await fbUpd(`rooms/${S.roomCode}`, { phase:'ready' });
  S.phase='ready'; scHostGame();
}

function scHostGame(){
  const p=S.phase, r=S.round;
  show(`<div style="padding:20px;text-align:center">
    ${(p==='ready')?`<canvas id="wheel" width="300" height="300"></canvas><br><button class="btn bp" onclick="doSpin()">Drehen</button>`:''}
    ${(p==='listening'||p==='guessing')?`<h2>${r.title}</h2><p>${r.artist}</p><div class="tbar-wrap"><div id="tbar" class="tbar"></div></div>`:''}
    ${(p==='revealing')?`<h1>${answerLabel(r.category, r)}</h1><button class="btn bp" onclick="doNextRound()">Weiter</button>`:''}
  </div>`);
  if(p==='ready') drawWheel($('wheel'), getCats());
}

async function doSpin(){
  const cats=getCats(); const tIdx=Math.floor(Math.random()*cats.length);
  await fbUpd(`rooms/${S.roomCode}`, { phase:'spinning' });
  spinTo($('wheel'), cats, tIdx, async (cat)=>{
    const track = S.tracks[Math.floor(Math.random()*S.tracks.length)];
    const rd = await buildRound(track, S.difficulty);
    rd.category = cat.id; S.round = rd;
    await fbUpd(`rooms/${S.roomCode}`, { phase:'listening', round:rd });
    S.phase='listening'; scHostGame();
    await playTrack(rd.uri);
    startTimer(30, tickUI, async()=>{ 
      await fbUpd(`rooms/${S.roomCode}`, { phase:'guessing' }); 
      S.phase='guessing'; scHostGame();
      startTimer(30, tickUI, doReveal);
    });
  });
}

async function doReveal(){
  stopTimer(); await stopPlayback();
  for(const pid in S.players){
    const pl = S.players[pid];
    const correct = checkAnswer(S.round.category, pl.answer, S.round);
    await fbUpd(`rooms/${S.roomCode}/players/${pid}`, { answeredCorrect:correct, score:(pl.score||0)+(correct?1:0) });
  }
  await fbUpd(`rooms/${S.roomCode}`, { phase:'revealing' });
  S.phase='revealing'; scHostGame();
}

function doNextRound(){ fbUpd(`rooms/${S.roomCode}`, { phase:'ready', round:null }); S.phase='ready'; scHostGame(); }

function scJoin(){
  show(`<div style="padding:40px">
    <input class="inp" id="jcode" placeholder="CODE"><br><br>
    <input class="inp" id="jname" placeholder="NAME"><br><br>
    <button class="btn bp" onclick="doJoin()">Go</button>
  </div>`);
}

async function doJoin(){
  const code=$('jcode').value.toUpperCase(); const name=$('jname').value;
  S.roomCode=code; S.playerName=name;
  await fbSet(`rooms/${code}/players/${PID}`, { name, answer:'', score:0 });
  fbOn(fdb.ref(`rooms/${code}`), 'value', snap => {
    const data=snap.val(); S.phase=data.phase; S.round=data.round;
    const me=data.players[PID]; S.myCard=me.card; S.myMarked=me.marked;
    scPlayerGame();
  });
}

function scPlayerGame(){
  const p=S.phase, r=S.round;
  if(!S.myCard) { show('Warten...'); return; }
  show(`<div style="padding:20px">
    ${p==='guessing'?`<input class="inp" id="ans" oninput="S.myAnswer=this.value"><button onclick="doSubmit()">Senden</button>`:''}
    ${p==='revealing'&&checkAnswer(r.category, S.myAnswer, r)?`<p>Richtig! Klicke zum Markieren.</p>`:''}
    <div class="bgrid">${S.myCard.map((c,i)=>`<div class="bcell ${S.myMarked[i]?'marked':''}" onclick="doMark(${i})">${getCat(S.difficulty,c).icon}</div>`).join('')}</div>
  </div>`);
}

async function doSubmit(){ await fbUpd(`rooms/${S.roomCode}/players/${PID}`, { answer:S.myAnswer, locked:true }); }

async function doMark(i){
  if(S.myMarked[i] || S.myCard[i]!==S.round.category) return;
  S.myMarked[i]=true;
  await fbUpd(`rooms/${S.roomCode}/players/${PID}/marked`, S.myMarked);
  if(checkBingo(S.myMarked)) await fbUpd(`rooms/${S.roomCode}/players/${PID}`, { bingo:true });
}

function loading(msg){ show(`<div class="loader"><div class="loader-spin"></div><p>${msg}</p></div>`); }

function init(){
  if(window.location.hash.includes('access_token')){ parseToken(); loadSDK(); S.role='host'; scHostSetup(); }
  else scLanding();
}

init();
</script>
</body>
</html>
