<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>HITSTER BINGO</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060610;--bg2:#0b0b1c;--bg3:#111125;--bg4:#16162e;
  --gold:#e8a020;--gold2:#f5c842;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;
  --tx:#eeeeff;--m:#6b7280;--m2:#9ca3af;
  --bdr:rgba(255,255,255,.09);--card:rgba(255,255,255,.04);
}
html,body{height:100%;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.4}
#app{min-height:100vh;position:relative}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap;line-height:1;text-decoration:none}
.bp{background:var(--gold);color:#000}.bp:hover{background:var(--gold2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,160,32,.3)}
.bg{background:var(--card);border:1px solid var(--bdr);color:var(--tx)}.bg:hover{background:rgba(255,255,255,.07)}
.br{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171}.br:hover{background:rgba(239,68,68,.18)}
.blg{padding:14px 24px;font-size:15px;border-radius:12px}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* ── Forms ── */
.lbl{display:block;font-size:11px;color:var(--m2);font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.08em}
.inp{width:100%;padding:11px 14px;background:var(--bg3);border:1.5px solid var(--bdr);border-radius:9px;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--m)}.inp:disabled{opacity:.5}

/* ── Nav ── */
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr);background:var(--bg2);position:sticky;top:0;z-index:10}
.ntit{font-family:'Syne',sans-serif;font-size:17px;font-weight:800}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:16px}

/* ── Room code ── */
.rcode{font-family:'Space Mono',monospace;font-size:clamp(32px,10vw,56px);font-weight:700;letter-spacing:clamp(4px,2vw,10px);color:var(--gold);background:var(--bg3);border:2px solid rgba(232,160,32,.25);border-radius:16px;padding:16px 24px;text-align:center}

/* ── Timer ── */
.tbar-wrap{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.tbar{height:100%;background:var(--gold);border-radius:3px;transition:width .25s linear}
.tbar.warn{background:var(--red)}

/* ── Bingo grid ── */
.bgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.bcell{aspect-ratio:1;border-radius:9px;border:1.5px solid var(--bdr);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;transition:all .2s;position:relative;background:var(--bg3);overflow:hidden}
.bcell.markable{cursor:pointer;animation:glow 1.2s ease-in-out infinite}
.bcell.marked{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.5)}
.bcell.marked .bicon{opacity:.5}
.bcell.marked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,24px);color:var(--green);font-weight:900;background:rgba(34,197,94,.08)}
.bicon{font-size:clamp(14px,4vw,22px);line-height:1;pointer-events:none}
.blabel{font-size:clamp(7px,1.8vw,10px);color:var(--m2);font-weight:700;text-align:center;line-height:1.1;margin-top:2px;pointer-events:none}

/* ── Wheel ── */
.wheel-outer{position:relative;display:inline-flex;flex-direction:column;align-items:center}
.wheel-ptr{width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid var(--gold);filter:drop-shadow(0 2px 6px rgba(232,160,32,.5));z-index:2;position:relative}

/* ── Chips ── */
.chip{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--bdr);border-radius:99px;padding:6px 14px;font-size:13px;font-weight:500}

/* ── Phase badge ── */
.pbadge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(232,160,32,.5)}50%{box-shadow:0 0 0 6px rgba(232,160,32,0)}}
@keyframes pop{0%,100%{transform:scale(1)}40%{transform:scale(1.1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bingo{0%{transform:scale(1)}15%{transform:scale(1.12)}30%{transform:scale(.96)}45%{transform:scale(1.06)}60%{transform:scale(.98)}100%{transform:scale(1)}}
.fu{animation:fadeUp .3s ease}

/* ── Diff buttons ── */
.dbtn{width:100%;padding:14px 16px;border-radius:11px;border:1.5px solid var(--bdr);background:var(--card);color:var(--tx);cursor:pointer;text-align:left;transition:all .18s;font-family:'DM Sans',sans-serif}
.dbtn:hover,.dbtn.sel{border-color:var(--gold);background:rgba(232,160,32,.07)}
.dbtn .dn{font-size:15px;font-weight:700;margin-bottom:2px}
.dbtn .dd{font-size:12px;color:var(--m2)}

/* ── Scroll ── */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* ── Loading overlay ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.loader-spin{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite}
.loader p{color:var(--m2);font-size:14px}

/* ── Reveal result ── */
.result-box{border-radius:14px;padding:18px;text-align:center}
.result-ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.25)}
.result-nok{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2)}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ════════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════════

const REDIRECT   = window.location.origin + window.location.pathname;
const SCOPES     = 'streaming user-read-email user-read-private user-modify-playback-state user-read-playback-state';

const FB_CFG = {

const CATS = {
  easy: [
    { id:'title',  label:'Titel',     icon:'🎵', color:'#e8a020', count:9 },
    { id:'artist', label:'Interpret', icon:'🎤', color:'#3b82f6', count:8 },

    { id:'decade',    label:'Jahrzehnt', icon:'📅', color:'#22c55e', count:4 },
    { id:'year',      label:'Jahr',      icon:'📆', color:'#8b5cf6', count:4 },

    { id:'year',       label:'Jahr',        icon:'📆', color:'#8b5cf6', count:3 },

  ],

const DIFF_META = {
  easy:   { name:'Easy 🟢',   desc:'Titel · Interpret · Jahrzehnt',          full:'Easy' },
  medium: { name:'Medium 🟡', desc:'+ Jahr · Album · Featuring',             full:'Medium' },

};

// ════════════════════════════════════════════════════════════
// FIREBASE
// ════════════════════════════════════════════════════════════
firebase.initializeApp(FB_CFG);
const fdb = firebase.database();

// ════════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════════
let PID = localStorage.getItem('hb_pid');
if(!PID){ PID = 'p_'+Math.random().toString(36).slice(2,10); localStorage.setItem('hb_pid', PID); }

const S = {
  role:null, roomCode:null, playerName:null,
  difficulty:null, playlistUrl:'',
  spotifyToken:null, spotifyPlayer:null, deviceId:null,
  tracks:[], usedIds:new Set(),
  currentTrack:null, round:null,
  players:{}, phase:null,
  myCard:null, myMarked:null,
  myAnswer:'', answerLocked:false,
  amICorrect:null, canMark:false,
  timerID:null, timerLeft:0,
  wheelRot:0, fListeners:[],
  prevPhase:null, roundNum:0,
};

// ════════════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const app = document.getElementById('app');
const show = html => { app.innerHTML = html; };
const shuffle = a => [...a].sort(()=>Math.random()-.5);
const getCat = (diff,id) => CATS[diff]?.find(c=>c.id===id) || {id,label:id,icon:'?',color:'#888',count:0};

function genCode(){
  const ch='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:5},()=>ch[Math.floor(Math.random()*ch.length)]).join('');
}

function genCard(diff){
  const fields=[];
  CATS[diff].forEach(c=>{ for(let i=0;i<c.count;i++) fields.push(c.id); });
  return shuffle(fields);
}

function checkBingo(marked){
  const m=i=>marked[i];
  for(let r=0;r<5;r++) if([0,1,2,3,4].every(c=>m(r*5+c))) return true;
  for(let c=0;c<5;c++) if([0,1,2,3,4].every(r=>m(r*5+c))) return true;
  if([0,6,12,18,24].every(m)) return true;
  if([4,8,12,16,20].every(m)) return true;
  return false;
}

function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w\s]/g,'').trim(); }

function checkAnswer(catId, userAns, round){
  const ua = norm(userAns);
  if(!ua) return false;
  const fuzzy = (a,b) => a.includes(b) || b.includes(a);
  switch(catId){
    case 'title':      return fuzzy(norm(round.title||''), ua);
    case 'artist':     return fuzzy(norm(round.artist||''), ua);
    case 'decade':     { const d=String(round.decade); return ua.includes(d.slice(0,3))||d.slice(0,3).includes(ua.replace(/\D/g,'').slice(0,3)); }
    case 'year':       return parseInt(ua)===round.year;
    case 'album':      return fuzzy(norm(round.album||''), ua);
    case 'featuring':  return fuzzy(norm(round.featuring||''), ua);
    case 'label':      return fuzzy(norm(round.label||''), ua);
    case 'genre':      return fuzzy(norm(round.genre||''), ua);
    case 'popularity': return Math.abs(parseInt(ua)-(round.popularity||0))<=10;
    default: return false;
  }
}

function answerLabel(catId, round){
  switch(catId){
    case 'title':      return round.title;
    case 'artist':     return round.artist;
    case 'decade':     return round.decade+'er';
    case 'year':       return String(round.year);
    case 'album':      return round.album;
    case 'featuring':  return round.featuring||'(kein Featuring)';
    case 'label':      return round.label||'Unbekannt';
    case 'genre':      return round.genre||'Unbekannt';
    case 'popularity': return round.popularity+' / 100';
    default: return '?';
  }
}

function placeholder(catId){
  return {title:'Songtitel…',artist:'Künstlername…',decade:'z.B. 90er',year:'z.B. 1995',
    album:'Albumname…',featuring:'Featuring-Artist…',label:'Label-Name…',
    genre:'Genre…',popularity:'Wert 0–100…'}[catId]||'Antwort…';
}

// ════════════════════════════════════════════════════════════
// FIREBASE HELPERS
// ════════════════════════════════════════════════════════════
function fbOn(ref, ev, cb){ ref.on(ev,cb); S.fListeners.push({ref,ev,cb}); }
function fbOff(){ S.fListeners.forEach(({ref,ev,cb})=>ref.off(ev,cb)); S.fListeners=[]; }
const rRef  = code => fdb.ref(`rooms/${code}`);
const plRef = (code,pid) => fdb.ref(`rooms/${code}/players/${pid}`);

async function fbSet(path, val){ await fdb.ref(path).set(val); }
async function fbUpd(path, val){ await fdb.ref(path).update(val); }
async function fbRm(path){ await fdb.ref(path).remove(); }
async function fbGet(path){ return (await fdb.ref(path).once('value')).val(); }

// ════════════════════════════════════════════════════════════
// SPOTIFY AUTH
// ════════════════════════════════════════════════════════════
function spotifyLogin(){
  sessionStorage.setItem('hb_return','host');
  window.location.href=`https://accounts.spotify.com/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=${encodeURIComponent(SCOPES)}`;
}

function parseToken(){
  const h=window.location.hash.slice(1);
  const p=new URLSearchParams(h);
  const t=p.get('access_token');
  if(t){ S.spotifyToken=t; localStorage.setItem('hb_tok',t); history.replaceState({},'',' '); return true; }
  const st=localStorage.getItem('hb_tok');
  if(st){ S.spotifyToken=st; return true; }
  return false;
}

async function tokenValid(){
  if(!S.spotifyToken) return false;
  try{
    const r=await fetch('https://api.spotify.com/v1/me',{headers:{Authorization:`Bearer ${S.spotifyToken}`}});
    return r.ok;
  }catch{ return false; }
}

function clearToken(){ localStorage.removeItem('hb_tok'); S.spotifyToken=null; }

// ════════════════════════════════════════════════════════════
// SPOTIFY PLAYER SDK
// ════════════════════════════════════════════════════════════
let sdkReady=false, sdkCB=null;
window.onSpotifyWebPlaybackSDKReady=()=>{ sdkReady=true; if(sdkCB) sdkCB(); };

function loadSDK(){
  if(document.getElementById('sp-sdk')) return;
  const s=document.createElement('script');
  s.id='sp-sdk'; s.src='https://sdk.scdn.co/spotify-player.js';
  document.head.appendChild(s);
}

function initPlayer(token){
  return new Promise((res,rej)=>{
    const go=()=>{
      const pl=new Spotify.Player({name:'Hitster Bingo',getOAuthToken:cb=>cb(token),volume:.75});
      pl.addListener('ready',({device_id})=>{ S.deviceId=device_id; S.spotifyPlayer=pl; res(pl); });
      pl.addListener('authentication_error',({message})=>{ clearToken(); rej(message); });
      pl.addListener('initialization_error',({message})=>rej(message));
      pl.connect();
    };
    if(sdkReady) go(); else sdkCB=go;
  });
}

async function playTrack(uri){
  if(!S.deviceId||!S.spotifyToken) return;
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${S.deviceId}`,{
    method:'PUT',
    headers:{Authorization:`Bearer ${S.spotifyToken}`,'Content-Type':'application/json'},
    body:JSON.stringify({uris:[uri]}),
  });
}

async function stopPlayback(){ if(S.spotifyPlayer) await S.spotifyPlayer.pause(); }

// ════════════════════════════════════════════════════════════
// SPOTIFY API
// ════════════════════════════════════════════════════════════
function extractPID(url){ return url.match(/playlist\/([A-Za-z0-9]+)/)?.[1]||url.trim(); }

async function loadTracks(url){
  const pid=extractPID(url);
  const tracks=[];
  let next=`https://api.spotify.com/v1/playlists/${pid}/tracks?limit=100&fields=next,items(track(id,name,artists,album(id,name,release_date),popularity))`;
  while(next && tracks.length<300){
    const r=await fetch(next,{headers:{Authorization:`Bearer ${S.spotifyToken}`}});
    if(!r.ok) throw new Error('Playlist nicht gefunden. Bitte URL prüfen.');
    const d=await r.json();
    d.items?.forEach(i=>{ if(i.track?.id) tracks.push(i.track); });
    next=d.next;
  }
  return tracks;
}

async function buildRound(track, diff){
  const year=parseInt(track.album?.release_date?.slice(0,4))||2000;
  const rd={
    trackId:track.id, uri:`spotify:track:${track.id}`,
    title:track.name,
    artist:track.artists[0]?.name||'',
    featuring:track.artists.slice(1).map(a=>a.name).join(', '),
    album:track.album?.name||'',
    year, decade:Math.floor(year/10)*10,
    popularity:track.popularity||0,
    label:'', genre:'',
  };
  if(diff==='hard'){
    try{
      const [al,ar]=await Promise.all([
        fetch(`https://api.spotify.com/v1/albums/${track.album.id}`,{headers:{Authorization:`Bearer ${S.spotifyToken}`}}).then(r=>r.json()),
        fetch(`https://api.spotify.com/v1/artists/${track.artists[0].id}`,{headers:{Authorization:`Bearer ${S.spotifyToken}`}}).then(r=>r.json()),
      ]);
      rd.label=al.label||''; rd.genre=ar.genres?.[0]||'';
    }catch{}
  }
  return rd;
}

// ════════════════════════════════════════════════════════════
// TIMER
// ════════════════════════════════════════════════════════════
function startTimer(secs, onTick, onEnd){
  clearInterval(S.timerID);
  S.timerLeft=secs;
  onTick(secs,secs);
  S.timerID=setInterval(()=>{
    S.timerLeft--;
    onTick(S.timerLeft,secs);
    if(S.timerLeft<=0){ clearInterval(S.timerID); onEnd(); }
  },1000);
}
function stopTimer(){ clearInterval(S.timerID); S.timerID=null; }

function tickUI(left, max){
  const bar=$('tbar'), lbl=$('tlbl');
  if(bar){ bar.style.width=(left/max*100)+'%'; if(left<=10) bar.classList.add('warn'); else bar.classList.remove('warn'); }
  if(lbl) lbl.textContent=left+'s';
}

// ════════════════════════════════════════════════════════════
// WHEEL DRAW + SPIN
// ════════════════════════════════════════════════════════════
function drawWheel(canvas, cats){
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  const cx=W/2, cy=H/2, r=Math.min(cx,cy)-6;
  const n=cats.length, seg=2*Math.PI/n;
  ctx.clearRect(0,0,W,H);
  // Outer ring
  ctx.beginPath(); ctx.arc(cx,cy,r+4,0,2*Math.PI);
  ctx.fillStyle='rgba(232,160,32,.15)'; ctx.fill();
  cats.forEach((c,i)=>{
    const a0=S.wheelRot+i*seg, a1=a0+seg;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,a0,a1); ctx.closePath();
    ctx.fillStyle=c.color+(i%2?'dd':'bb'); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)'; ctx.lineWidth=1.5; ctx.stroke();
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(a0+seg/2);
    const fs=Math.max(9,Math.min(14,Math.floor(r*.09)));
    ctx.font=`${Math.max(14,Math.floor(r*.14))}px serif`;
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(c.icon, r-8, -fs*.6);
    ctx.font=`bold ${fs}px 'DM Sans',sans-serif`;
    ctx.fillStyle='#fff'; ctx.shadowBlur=4; ctx.shadowColor='rgba(0,0,0,.9)';
    ctx.fillText(c.label, r-8, fs*.8);
    ctx.restore();
  });
  // Center
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
  g.addColorStop(0,'#2a2a3a'); g.addColorStop(1,'#111120');
  ctx.beginPath(); ctx.arc(cx,cy,20,0,2*Math.PI); ctx.fillStyle=g; ctx.fill();
  ctx.strokeStyle='rgba(232,160,32,.3)'; ctx.lineWidth=2; ctx.stroke();
}

function spinTo(canvas, cats, tIdx, done){
  const n=cats.length, seg=2*Math.PI/n;
  const tCenter=tIdx*seg+seg/2;
  const tRot=-Math.PI/2-tCenter;
  const spins=(5+Math.floor(Math.random()*4))*2*Math.PI;
  const cur=((S.wheelRot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const target=((tRot%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const amount=spins+((target-cur+2*Math.PI)%(2*Math.PI));
  const start=S.wheelRot, t0=performance.now(), dur=4200;
  const ease=t=>1-Math.pow(1-t,4);
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    S.wheelRot=start+amount*ease(t);
    drawWheel(canvas,cats);
    if(t<1) requestAnimationFrame(frame);
    else{ S.wheelRot=start+amount; drawWheel(canvas,cats); setTimeout(()=>done(cats[tIdx]),400); }
  }
  requestAnimationFrame(frame);
}

  loading('Lade Playlist…');
  try{
    S.tracks=await loadTracks(url);
    if(S.tracks.length<5){ alert('Playlist braucht mind. 5 Songs!'); scHostSetup(); return; }
  }catch(e){ alert(e.message); scHostSetup(); return; }

  const code=genCode();
  S.roomCode=code; S.usedIds=new Set();

  await fbSet(`rooms/${code}`,{
    phase:'lobby', difficulty:S.difficulty, hostId:PID,
    round:null, players:{}, roundNum:0,
  });

  // Listen to players
  fbOn(fdb.ref(`rooms/${code}/players`),'value',snap=>{
    S.players=snap.val()||{};
    if(S.phase==='lobby') scHostLobby();
    else if(S.phase==='revealing'||S.phase==='marking'){
      // Check bingo
      for(const pl of Object.values(S.players)){
        if(pl.bingo){ scWin(pl.name); return; }
      }
    }
  });

  S.phase='lobby';
  scHostLobby();
}

function loading(msg){
  show(`<div class="loader"><div class="loader-spin"></div><p>${msg}</p></div>`);
}

async function doStartGame(){
  const pls=Object.entries(S.players);
  if(!pls.length) return;

  // Assign cards
  for(const [pid] of pls){
    const card=genCard(S.difficulty);
    await fbUpd(`rooms/${S.roomCode}/players/${pid}`,{
      card, marked:Array(25).fill(false),
      answer:'', locked:false, answeredCorrect:false, score:0, bingo:false,
    });
  }

  await fbUpd(`rooms/${S.roomCode}`,{phase:'ready'});
  S.phase='ready';
  S.roundNum=0;
  scHostGame();
}

async function doSpin(){
  const cats=getCats();
  const tIdx=Math.floor(Math.random()*cats.length);
  await fbUpd(`rooms/${S.roomCode}`,{phase:'spinning'});
  S.phase='spinning';
  scHostGame();

  const wc=$('wheel');
  if(!wc) return;
  drawWheel(wc,cats);

  spinTo(wc, cats, tIdx, async (selCat)=>{
    // Pick track
    const avail=S.tracks.filter(t=>{
      if(S.usedIds.has(t.id)) return false;
      if(selCat.id==='featuring' && t.artists.length<2) return false;
      return true;
    });
    if(!avail.length){
      alert('Keine passenden Songs mehr – Runde überspringen.');
      await fbUpd(`rooms/${S.roomCode}`,{phase:'ready'});
      S.phase='ready'; scHostGame(); return;
    }

    const track=avail[Math.floor(Math.random()*avail.length)];
    S.usedIds.add(track.id);

    loading('Lade Song…');
    let rd;
    try{ rd=await buildRound(track, S.difficulty); }
    catch(e){ alert('Song-Fehler: '+e.message); S.phase='ready'; scHostGame(); return; }
    rd.category=selCat.id;
    S.round=rd;
    S.roundNum++;

    // Reset player answers
    for(const pid of Object.keys(S.players)){
      await fbUpd(`rooms/${S.roomCode}/players/${pid}`,{answer:'',locked:false,answeredCorrect:false});
    }

    await fbUpd(`rooms/${S.roomCode}`,{phase:'listening', round:rd, roundNum:S.roundNum});
    S.phase='listening';

    await playTrack(rd.uri);
    scHostGame();

    startTimer(30,
      (l,m)=>{ S.timerLeft=l; tickUI(l,m); },
      async()=>{
        await fbUpd(`rooms/${S.roomCode}`,{phase:'guessing'});
        S.phase='guessing'; scHostGame();
        startTimer(30,
          (l,m)=>{ S.timerLeft=l; tickUI(l,m); },
          async()=>{
            for(const pid of Object.keys(S.players)){
              if(!S.players[pid]?.locked)
                await fbUpd(`rooms/${S.roomCode}/players/${pid}`,{locked:true});
            }
          }
        );
      }
    );
  });
}

async function doReveal(){
  stopTimer();
  await stopPlayback();

  for(const [pid,pl] of Object.entries(S.players)){
    const correct=checkAnswer(S.round.category, pl.answer||'', S.round);
    const ns=(pl.score||0)+(correct?1:0);
    await fbUpd(`rooms/${S.roomCode}/players/${pid}`,{answeredCorrect:correct, score:ns});
  }

  await fbUpd(`rooms/${S.roomCode}`,{phase:'revealing'});
  S.phase='revealing';
  scHostGame();
}

async function doNextRound(){
  await fbUpd(`rooms/${S.roomCode}`,{phase:'ready', round:null});
  S.phase='ready'; S.round=null;
  scHostGame();
}

async function doEndGame(){
  if(!confirm('Spiel wirklich beenden?')) return;
  stopTimer(); await stopPlayback(); fbOff();
  if(S.roomCode) await fbRm(`rooms/${S.roomCode}`);
  S.roomCode=null; scLanding();
}

async function doCancel(){
  fbOff();
  if(S.roomCode) await fbRm(`rooms/${S.roomCode}`);
  S.roomCode=null; scLanding();
}

// ════════════════════════════════════════════════════════════
// ACTIONS · PLAYER
// ════════════════════════════════════════════════════════════
async function doJoin(){
  const code=($('jcode')?.value||'').trim().toUpperCase();
  const name=($('jname')?.value||'').trim();
  if(code.length!==5){ alert('Bitte 5-stelligen Code eingeben'); return; }
  if(!name){ alert('Bitte Name eingeben'); return; }

  loading('Verbinde…');
  const room=await fbGet(`rooms/${code}`);
  if(!room){ alert('Raum nicht gefunden!'); scJoin(); return; }

  S.roomCode=code; S.playerName=name; S.difficulty=room.difficulty;
  S.myCard=null; S.myMarked=null; S.myAnswer=''; S.answerLocked=false;
  S.amICorrect=null; S.canMark=false;

  await fbSet(`rooms/${code}/players/${PID}`,{
    name, card:null, marked:Array(25).fill(false),
    answer:'', locked:false, answeredCorrect:false, score:0, bingo:false,
  });

  // Main listener
  fbOn(fdb.ref(`rooms/${code}`),'value', snap=>{
    if(!snap.exists()){ alert('Raum wurde geschlossen.'); fbOff(); scLanding(); return; }
    const data=snap.val();
    const prevP=S.phase;
    S.phase=data.phase;
    S.players=data.players||{};
    S.round=data.round||null;
    S.difficulty=data.difficulty||'easy';

    // Get my data
    const me=data.players?.[PID]||{};
    if(me.card && !S.myCard){ S.myCard=me.card; }
    if(me.marked) S.myMarked=me.marked;

    // Phase transitions
    if(S.phase==='lobby'||S.phase===null){ scPlayerWait(); return; }

    if(S.phase==='ready'||S.phase==='start'){
      stopTimer();
      S.myAnswer=''; S.answerLocked=false; S.amICorrect=null; S.canMark=false;
      scPlayerGame(); return;
    }

    if(S.phase==='spinning'){ stopTimer(); scPlayerGame(); return; }

    if(S.phase==='listening'){
      if(prevP!=='listening'){
        stopTimer();
        startTimer(30, (l,m)=>{ S.timerLeft=l; tickUI(l,m); }, ()=>{});
      }
      scPlayerGame(); return;
    }

    if(S.phase==='guessing'){
      if(prevP!=='guessing'){
        stopTimer();
        S.myAnswer=''; S.answerLocked=false;
        startTimer(30,
          (l,m)=>{ S.timerLeft=l; tickUI(l,m); },
          ()=>{ if(!S.answerLocked) doSubmit(); }
        );
      }
      scPlayerGame(); return;
    }

    if(S.phase==='revealing'){
      stopTimer();
      if(S.round) S.amICorrect=checkAnswer(S.round.category, S.myAnswer, S.round);
      S.canMark=!!S.amICorrect;
      scPlayerGame(); return;
    }

    if(S.phase==='marking'){
      S.canMark=!!S.amICorrect;
      scPlayerGame(); return;
    }
  });
}

async function doSubmit(){
  if(S.answerLocked) return;
  S.answerLocked=true;
  await fbUpd(`rooms/${S.roomCode}/players/${PID}`,{ answer:S.myAnswer||'', locked:true });
  scPlayerGame();
}

async function doMark(idx){
  if(!S.canMark||!S.amICorrect||!S.myCard||!S.myMarked) return;
  if(S.myMarked[idx]) return;
  if(S.myCard[idx]!==S.round.category) return;

  S.myMarked[idx]=true;
  S.canMark=false;

  await fbUpd(`rooms/${S.roomCode}/players/${PID}/marked`, S.myMarked);

  if(checkBingo(S.myMarked)){
    await fbUpd(`rooms/${S.roomCode}/players/${PID}`,{bingo:true, score:(S.players[PID]?.score||0)+1});
    scWin(S.playerName); return;
  }

  scPlayerGame();
}

// ════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════
function init(){
  const h=window.location.hash;
  if(h.includes('access_token')){
    parseToken(); loadSDK(); S.role='host'; scHostSetup(); return;
  }
  scLanding();
}

init();
</script>
